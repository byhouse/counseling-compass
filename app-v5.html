    { id:'reality', cat:'기타',      name:'현실치료', core:'선택이론, WDEP, 기본욕구', tech:'현재행동탐색, 평가, 계획', view:'선택하는 책임 있는 존재', role:'교사, 코치', strength:'책임감 강조, 명확한 구조', limit:'과거·무의식 무시' },
    { id:'sfbt',    cat:'기타',      name:'해결중심단기치료', core:'해결중심, 예외상황, 기적질문', tech:'기적질문, 척도질문, 예외질문', view:'이미 해결 능력을 가진 존재', role:'협력자, 강점 탐색자', strength:'단기·효율적, 강점 중심', limit:'심각한 문제에 한계' },
  ];

  const CAT_COLORS = { '정신역동':'#c2685a','인본주의':'#6b8f71','인지행동':'#5a7ab0','기타':'#8a6fa0' };
  let expandedTheory = null;

  function renderTheory() {
    const wrap = document.getElementById('cc-theory-table-wrap');
    if (!wrap) return;
    const cats = ['정신역동','인본주의','인지행동','기타'];
    wrap.innerHTML = cats.map(cat => {
      const ts = THEORIES.filter(t=>t.cat===cat);
      return `<div class="cc-theory-cat">
        <div class="cc-theory-cat-label" style="border-color:${CAT_COLORS[cat]};color:${CAT_COLORS[cat]}">${cat}</div>
        ${ts.map(t => {
          const isOpen = expandedTheory === t.id;
          return `<div class="cc-theory-card ${isOpen?'open':''}" data-theoryid="${t.id}" style="--tc:${CAT_COLORS[cat]}">
            <div class="cc-theory-card-head">
              <span class="cc-theory-card-name">${escapeHtml(t.name)}</span>
              <span class="cc-theory-card-toggle">${isOpen?'▲ 접기':'▼ 펼치기'}</span>
            </div>
            <div class="cc-theory-card-preview">${escapeHtml(t.core.split(',')[0])}…</div>
            ${isOpen ? `<div class="cc-theory-card-body">
              <div class="cc-theory-row"><span class="cc-theory-row-label">📌 핵심 개념</span><span>${escapeHtml(t.core)}</span></div>
              <div class="cc-theory-row"><span class="cc-theory-row-label">🛠 주요 기법</span><span>${escapeHtml(t.tech)}</span></div>
              <div class="cc-theory-row"><span class="cc-theory-row-label">👁 인간관</span><span>${escapeHtml(t.view)}</span></div>
              <div class="cc-theory-row"><span class="cc-theory-row-label">🧑‍💼 상담자 역할</span><span>${escapeHtml(t.role)}</span></div>
              <div class="cc-theory-row strength"><span class="cc-theory-row-label">✅ 강점</span><span>${escapeHtml(t.strength)}</span></div>
              <div class="cc-theory-row limit"><span class="cc-theory-row-label">⚠️ 한계</span><span>${escapeHtml(t.limit)}</span></div>
            </div>` : ''}
          </div>`;
        }).join('')}
      </div>`;
    }).join('');

    wrap.querySelectorAll('[data-theoryid]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.getAttribute('data-theoryid');
        expandedTheory = expandedTheory === id ? null : id;
        renderTheory();
      });
    });

    // theory notes
    const notesRoot = document.getElementById('cc-theory-notes-list');
    if (!notesRoot) return;
    notesRoot.innerHTML = theoryNotes.map((n,i) => `
      <div class="cc-theory-note-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:12px;font-weight:700;color:var(--rose);">${i+1}.</span>
          <span class="cc-theory-note-name">${escapeHtml(n.name)}</span>
          <span style="flex:1"></span>
          <span style="font-size:11px;color:var(--ink-soft);">${n.created?formatDateTime(n.created):''}</span>
          <button class="cc-del-btn" data-edittheorynote="${n.id}" style="color:var(--sage);opacity:1">수정</button>
          <button class="cc-del-btn" data-deltheorynote="${n.id}">삭제</button>
        </div>
        <div class="cc-theory-note-text">${escapeHtml(n.text)}</div>
      </div>`).join('') || '<div class="cc-empty">나만의 이론 노트를 추가해보세요!</div>';

    notesRoot.querySelectorAll('[data-edittheorynote]').forEach(el => {
      el.addEventListener('click', () => {
        const n = theoryNotes.find(x=>x.id===el.getAttribute('data-edittheorynote'));
        if (!n) return;
        editingTheoryNoteId = n.id;
        document.getElementById('cc-theory-note-name').value = n.name;
        document.getElementById('cc-theory-note-text').value = n.text;
        document.getElementById('cc-theory-note-save').textContent = '수정 완료';
        document.getElementById('cc-theory-note-cancel').style.display = '';
        document.getElementById('cc-theory-note-name').focus();
      });
    });
    notesRoot.querySelectorAll('[data-deltheorynote]').forEach(el => {
      el.addEventListener('click', async () => {
        theoryNotes = theoryNotes.filter(x=>x.id!==el.getAttribute('data-deltheorynote'));
        await saveTheoryNotes(); renderTheory();
      });
    });
  }
  document.getElementById('cc-theory-note-cancel') && document.getElementById('cc-theory-note-cancel').addEventListener('click', () => {
    editingTheoryNoteId = null;
    document.getElementById('cc-theory-note-name').value = '';
    document.getElementById('cc-theory-note-text').value = '';
    document.getElementById('cc-theory-note-save').textContent = '추가';
    document.getElementById('cc-theory-note-cancel').style.display = 'none';
  });
  document.getElementById('cc-theory-note-save') && document.getElementById('cc-theory-note-save').addEventListener('click', async()=>{
    const name=document.getElementById('cc-theory-note-name').value.trim();
    const text=document.getElementById('cc-theory-note-text').value.trim();
    if(!name||!text) return;
    if (editingTheoryNoteId) {
      const n = theoryNotes.find(x=>x.id===editingTheoryNoteId);
      if (n) { n.name=name; n.text=text; }
      editingTheoryNoteId = null;
      document.getElementById('cc-theory-note-save').textContent='추가';
      document.getElementById('cc-theory-note-cancel').style.display='none';
    } else {
      theoryNotes.push({id:uid(),name,text,created:Date.now()});
    }
    document.getElementById('cc-theory-note-name').value=''; document.getElementById('cc-theory-note-text').value='';
    await saveTheoryNotes(); renderTheory();
  });

  // ── FLASHCARD ─────────────────────────────────────────────────────────────
  const REF_PROMPTS = {
    study:  '오늘 공부에서 가장 인상 깊었던 것은 무엇인가요?',
    self:   '나는 어떤 상담자가 되고 싶은가요? 오늘 그 방향으로 나아갔나요?',
    emotion:'지금 나의 상태는 어떤가요? 무엇을 느끼고 있나요?',
    growth: '최근 나에게서 달라진 것이 있다면 무엇인가요?',
    free:   '지금 마음에 떠오르는 것을 자유롭게 써보세요.',
  };
  function updateRefPrompt() {
    const t = document.getElementById('cc-ref-type') && document.getElementById('cc-ref-type').value;
    const lbl = document.getElementById('cc-ref-prompt-label');
    const ta = document.getElementById('cc-ref-text');
    if (lbl) lbl.textContent = REF_PROMPTS[t] || '';
    if (ta) ta.placeholder = REF_PROMPTS[t] || '';
  }
  document.getElementById('cc-ref-type') && document.getElementById('cc-ref-type').addEventListener('change', updateRefPrompt);
  setTimeout(updateRefPrompt, 100);

  document.getElementById('cc-fc-start-btn') && document.getElementById('cc-fc-start-btn').addEventListener('click', () => {
    if (!dictEntries.length) { alert('상담사전에 용어를 먼저 추가해주세요!'); return; }
    fcMode = document.getElementById('cc-fc-mode').value;
    fcCards = [...dictEntries].sort(() => Math.random() - 0.5);
    fcIndex = 0; fcScore = 0; fcAgain = []; fcFlipped = false;
    document.getElementById('cc-flashcard-setup').style.display = 'none';
    document.getElementById('cc-flashcard-game').style.display = '';
    document.getElementById('cc-flashcard-done').style.display = 'none';
    renderFlashcard();
  });
  function renderFlashcard() {
    if (fcIndex >= fcCards.length) { showFcDone(); return; }
    const c = fcCards[fcIndex];
    const pct = Math.round((fcIndex / fcCards.length) * 100);
    document.getElementById('cc-fc-progress-bar').style.width = pct + '%';
    document.getElementById('cc-fc-stats').textContent = `${fcIndex + 1} / ${fcCards.length} | ✓ ${fcScore}`;
    const showTerm = fcMode === 'term2def' || (fcMode === 'random' && Math.random() > 0.5);
    document.getElementById('cc-fc-front').textContent = showTerm ? c.term : c.definition;
    document.getElementById('cc-fc-back').textContent = showTerm ? c.definition : c.term;
    document.getElementById('cc-fc-front').style.display = '';
    document.getElementById('cc-fc-back').style.display = 'none';
    document.getElementById('cc-fc-btns').style.display = 'flex';
    document.getElementById('cc-fc-result-btns').style.display = 'none';
    fcFlipped = false;
  }
  function showFcDone() {
    if (fcAgain.length > 0) {
      fcCards = [...fcAgain]; fcAgain = []; fcIndex = 0;
      document.getElementById('cc-fc-done-msg').textContent = `한 번 더! 다시볼 카드 ${fcCards.length}개`;
      document.getElementById('cc-fc-done-sub').textContent = '다시볼게요 카드를 한 번 더 복습해요.';
    } else {
      document.getElementById('cc-flashcard-game').style.display = 'none';
      document.getElementById('cc-flashcard-done').style.display = '';
      document.getElementById('cc-fc-done-msg').textContent = `완료! ${fcScore}/${dictEntries.length} 알겠어요`;
      document.getElementById('cc-fc-done-sub').textContent = fcScore === dictEntries.length ? '완벽해요! 모든 용어를 알고 있어요 🎉' : '조금 더 복습하면 완벽해져요!';
      return;
    }
    renderFlashcard();
  }
  document.getElementById('cc-fc-flip-btn') && document.getElementById('cc-fc-flip-btn').addEventListener('click', () => {
    document.getElementById('cc-fc-back').style.display = '';
    document.getElementById('cc-fc-btns').style.display = 'none';
    document.getElementById('cc-fc-result-btns').style.display = 'flex';
    fcFlipped = true;
  });
  document.getElementById('cc-fc-got-btn') && document.getElementById('cc-fc-got-btn').addEventListener('click', () => { fcScore++; fcIndex++; renderFlashcard(); });
  document.getElementById('cc-fc-again-btn') && document.getElementById('cc-fc-again-btn').addEventListener('click', () => { fcAgain.push(fcCards[fcIndex]); fcIndex++; renderFlashcard(); });
  document.getElementById('cc-fc-end-btn') && document.getElementById('cc-fc-end-btn').addEventListener('click', () => {
    document.getElementById('cc-flashcard-setup').style.display = '';
    document.getElementById('cc-flashcard-game').style.display = 'none';
    document.getElementById('cc-flashcard-done').style.display = 'none';
  });
  document.getElementById('cc-fc-retry-btn') && document.getElementById('cc-fc-retry-btn').addEventListener('click', () => {
    document.getElementById('cc-flashcard-setup').style.display = '';
    document.getElementById('cc-flashcard-done').style.display = 'none';
  });

  // ── SELF REFLECTION ────────────────────────────────────────────────────────
  const refTypeLabel = { study:'📚 공부', self:'🪞 자기이해', emotion:'💭 감정', growth:'🌱 성장', free:'✏️ 자유' };
  function renderReflection() {
    const root = document.getElementById('cc-ref-list');
    if (!root) return;
    const filtered = selectedRefFilter==='all' ? reflections : reflections.filter(r=>r.type===selectedRefFilter);
    const sorted = [...filtered].sort((a,b)=>b.created-a.created);
    root.innerHTML = sorted.length ? `<div class="cc-notes-meta-bar"><span>총 ${sorted.length}개</span></div>` + sorted.map((r,i)=>`
      <div class="cc-ref-card">
        <div class="cc-ref-card-head">
          <span style="font-size:12px;font-weight:700;color:var(--rose);">${i+1}.</span>
          <span class="cc-ref-type-badge">${refTypeLabel[r.type]||r.type}</span>
          <span class="cc-ref-datetime">${formatDateTime(r.created)}</span>
          <span class="cc-note-spacer"></span>
          <button class="cc-del-btn" data-editref="${r.id}" style="color:var(--sage);opacity:1">수정</button>
          <button class="cc-del-btn" data-delref="${r.id}">삭제</button>
        </div>
        <div class="cc-ref-body">${escapeHtml(r.text)}</div>
      </div>`).join('') : '<div class="cc-empty">아직 성찰 기록이 없어요. 오늘의 생각을 적어보세요!</div>';

    root.querySelectorAll('[data-editref]').forEach(el => {
      el.addEventListener('click', () => {
        const r = reflections.find(x=>x.id===el.getAttribute('data-editref'));
        if (!r) return;
        editingReflectionId = r.id;
        document.getElementById('cc-ref-type').value = r.type;
        document.getElementById('cc-ref-text').value = r.text;
        updateRefPrompt();
        document.getElementById('cc-ref-save-btn').textContent = '수정 완료';
        document.getElementById('cc-ref-cancel-btn').style.display = '';
        document.getElementById('cc-ref-text').scrollIntoView({behavior:'smooth',block:'center'});
        document.getElementById('cc-ref-text').focus();
      });
    });
    root.querySelectorAll('[data-delref]').forEach(el=>{
      el.addEventListener('click', async()=>{ reflections=reflections.filter(r=>r.id!==el.getAttribute('data-delref')); await saveReflections(); renderReflection(); });
    });
  }
  document.getElementById('cc-ref-filter-row') && document.getElementById('cc-ref-filter-row').querySelectorAll('[data-reffilter]').forEach(btn=>{
    btn.addEventListener('click',()=>{ selectedRefFilter=btn.getAttribute('data-reffilter');
      document.getElementById('cc-ref-filter-row').querySelectorAll('[data-reffilter]').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); renderReflection(); });
  });
  document.getElementById('cc-ref-cancel-btn') && document.getElementById('cc-ref-cancel-btn').addEventListener('click', () => {
    editingReflectionId = null;
    document.getElementById('cc-ref-text').value = '';
    document.getElementById('cc-ref-save-btn').textContent = '성찰 기록하기';
    document.getElementById('cc-ref-cancel-btn').style.display = 'none';
  });
  document.getElementById('cc-ref-save-btn') && document.getElementById('cc-ref-save-btn').addEventListener('click', async()=>{
    const text=document.getElementById('cc-ref-text').value.trim();
    if (!text) return;
    const type=document.getElementById('cc-ref-type').value;
    if (editingReflectionId) {
      const r = reflections.find(x=>x.id===editingReflectionId);
      if (r) { r.text=text; r.type=type; }
      editingReflectionId = null;
      document.getElementById('cc-ref-save-btn').textContent='성찰 기록하기';
      document.getElementById('cc-ref-cancel-btn').style.display='none';
    } else {
      reflections.push({id:uid(),type,text,created:Date.now()});
    }
    document.getElementById('cc-ref-text').value='';
    await saveReflections(); renderReflection();
  });

  // ── PAPER MANAGEMENT ──────────────────────────────────────────────────────
  const paperStatusLabel = { idea:'💡 아이디어', planning:'📋 기획 중', inprogress:'⚙️ 진행 중', writing:'✍️ 작성 중', done:'✅ 완성' };
  function renderPapers() {
    const root = document.getElementById('cc-paper-list');
    if (!root) return;
    const sorted = [...papers].sort((a,b)=>b.created-a.created);
    root.innerHTML = sorted.length ? sorted.map((p,i)=>`
      <div class="cc-paper-card">
        <div class="cc-paper-head">
          <span style="color:var(--rose);font-size:13px;font-weight:700;">${i+1}.</span>
          <span class="cc-paper-title-text">${escapeHtml(p.title)}</span>
          <span class="cc-paper-status-badge ${p.status}">${paperStatusLabel[p.status]||p.status}</span>
        </div>
        <div class="cc-paper-body">
          ${p.question?`<div class="cc-paper-section"><div class="cc-paper-section-label">연구 질문</div><div class="cc-paper-section-text">${escapeHtml(p.question)}</div></div>`:''}
          ${p.background?`<div class="cc-paper-section"><div class="cc-paper-section-label">배경/필요성</div><div class="cc-paper-section-text">${escapeHtml(p.background)}</div></div>`:''}
          ${p.method?`<div class="cc-paper-section"><div class="cc-paper-section-label">방법론</div><div class="cc-paper-section-text">${escapeHtml(p.method)}</div></div>`:''}
          <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:8px;">
            <span style="font-size:11px;color:var(--ink-soft);">${formatDateTime(p.created)}</span>
            <button class="cc-del-btn" data-paperedit="${p.id}" style="color:var(--sage);opacity:1">수정</button>
            <button class="cc-del-btn" data-paperdel="${p.id}">삭제</button>
          </div>
        </div>
      </div>`).join('') : '<div class="cc-empty">아직 논문 아이디어가 없어요. 연구 질문을 정리해보세요!</div>';
    root.querySelectorAll('[data-paperdel]').forEach(el=>{ el.addEventListener('click', async()=>{ papers=papers.filter(p=>p.id!==el.getAttribute('data-paperdel')); await savePapers(); renderPapers(); }); });
    root.querySelectorAll('[data-paperedit]').forEach(el=>{
      el.addEventListener('click',()=>{ const p=papers.find(x=>x.id===el.getAttribute('data-paperedit')); if(!p) return;
        editingPaperId=p.id; ['title','question','background','method'].forEach(f=>{ const el2=document.getElementById(`cc-paper-${f}`); if(el2) el2.value=p[f]||''; });
        const sel=document.getElementById('cc-paper-status'); if(sel) sel.value=p.status;
        document.getElementById('cc-paper-save-btn').textContent='수정 완료';
        document.getElementById('cc-paper-cancel-btn').style.display='';
        document.getElementById('cc-paper-title').scrollIntoView({behavior:'smooth',block:'center'});
      });
    });
  }
  document.getElementById('cc-paper-cancel-btn') && document.getElementById('cc-paper-cancel-btn').addEventListener('click', () => {
    editingPaperId = null;
    ['title','question','background','method'].forEach(f=>{const el=document.getElementById(`cc-paper-${f}`);if(el)el.value='';});
    document.getElementById('cc-paper-save-btn').textContent='저장';
    document.getElementById('cc-paper-cancel-btn').style.display='none';
  });
  document.getElementById('cc-paper-save-btn') && document.getElementById('cc-paper-save-btn').addEventListener('click', async()=>{
    const title=document.getElementById('cc-paper-title').value.trim(); if(!title) return;
    const data={title, question:document.getElementById('cc-paper-question').value.trim(), background:document.getElementById('cc-paper-background').value.trim(), method:document.getElementById('cc-paper-method').value.trim(), status:document.getElementById('cc-paper-status').value};
    if(editingPaperId){ const p=papers.find(x=>x.id===editingPaperId); if(p) Object.assign(p,data); editingPaperId=null; document.getElementById('cc-paper-save-btn').textContent='저장'; document.getElementById('cc-paper-cancel-btn').style.display='none'; }
    else papers.push({id:uid(),...data,created:Date.now()});
    ['title','question','background','method'].forEach(f=>{const el=document.getElementById(`cc-paper-${f}`);if(el)el.value='';});
    await savePapers(); renderPapers();
  });

  // ── SESSION RECORDS ────────────────────────────────────────────────────────
  const sessTypeLabel = {individual:'개인상담',group:'집단상담',family:'가족상담',intake:'접수면접',assess:'심리평가'};
  function resetSessionForm() {
    editingSessionId = null;
    ['cc-sess-code','cc-sess-topic','cc-sess-content','cc-sess-next'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('cc-sess-save-btn').textContent='회기 기록 저장';
    document.getElementById('cc-sess-cancel-btn').style.display='none';
  }
  function renderSessions() {
    const sum = document.getElementById('cc-session-summary');
    const root = document.getElementById('cc-sess-list');
    if (sum) {
      const total=sessions.length, ind=sessions.filter(s=>s.type==='individual').length, intake=sessions.filter(s=>s.type==='intake').length, assess=sessions.filter(s=>s.type==='assess').length;
      sum.innerHTML=`<div class="cc-sess-stat"><div class="cc-sess-stat-num">${total}</div><div class="cc-sess-stat-label">전체 기록</div></div>
        <div class="cc-sess-stat"><div class="cc-sess-stat-num">${ind}</div><div class="cc-sess-stat-label">개인상담</div></div>
        <div class="cc-sess-stat"><div class="cc-sess-stat-num">${intake}</div><div class="cc-sess-stat-label">접수면접</div></div>
        <div class="cc-sess-stat"><div class="cc-sess-stat-num">${assess}</div><div class="cc-sess-stat-label">심리평가</div></div>`;
    }
    if (!root) return;
    const sorted=[...sessions].sort((a,b)=>b.created-a.created);
    root.innerHTML = sorted.length ? sorted.map((s,i)=>`
      <div class="cc-sess-card">
        <div class="cc-sess-head">
          <span style="font-size:12px;font-weight:700;color:var(--rose);">${i+1}.</span>
          <span class="cc-sess-code">${escapeHtml(s.code||'?')} ${s.sessionNum?`#${s.sessionNum}회기`:''}</span>
          <span class="cc-sess-type-badge">${sessTypeLabel[s.type]||s.type}</span>
          <span class="cc-note-spacer"></span>
          <span class="cc-sess-meta">${s.date||''}</span>
          <button class="cc-del-btn" data-sessedit="${s.id}" style="color:var(--sage);opacity:1">수정</button>
          <button class="cc-del-btn" data-sessdel="${s.id}">삭제</button>
        </div>
        ${s.topic?`<div class="cc-sess-section-label">주제</div><div class="cc-sess-section">${escapeHtml(s.topic)}</div>`:''}
        ${s.content?`<div class="cc-sess-section-label">내용</div><div class="cc-sess-section">${escapeHtml(s.content)}</div>`:''}
        ${s.next?`<div class="cc-sess-section-label">다음 계획</div><div class="cc-sess-section">${escapeHtml(s.next)}</div>`:''}
        <div style="font-size:11px;color:var(--ink-soft);text-align:right;margin-top:4px;">${s.created?formatDateTime(s.created):''}</div>
      </div>`).join('') : '<div class="cc-empty">아직 회기 기록이 없어요.</div>';
    root.querySelectorAll('[data-sessedit]').forEach(el=>{
      el.addEventListener('click',()=>{ const s=sessions.find(x=>x.id===el.getAttribute('data-sessedit')); if(!s) return;
        editingSessionId=s.id;
        document.getElementById('cc-sess-date').value=s.date||'';
        document.getElementById('cc-sess-code').value=s.code||'';
        document.getElementById('cc-sess-num').value=s.sessionNum||1;
        document.getElementById('cc-sess-type').value=s.type||'individual';
        document.getElementById('cc-sess-topic').value=s.topic||'';
        document.getElementById('cc-sess-content').value=s.content||'';
        document.getElementById('cc-sess-next').value=s.next||'';
        document.getElementById('cc-sess-save-btn').textContent='수정 완료';
        document.getElementById('cc-sess-cancel-btn').style.display='';
        document.getElementById('cc-sess-code').scrollIntoView({behavior:'smooth',block:'center'});
      });
    });
    root.querySelectorAll('[data-sessdel]').forEach(el=>{ el.addEventListener('click',async()=>{ sessions=sessions.filter(s=>s.id!==el.getAttribute('data-sessdel')); await saveSessions(); renderSessions(); }); });
  }
  document.getElementById('cc-sess-cancel-btn') && document.getElementById('cc-sess-cancel-btn').addEventListener('click', resetSessionForm);
  document.getElementById('cc-sess-save-btn') && document.getElementById('cc-sess-save-btn').addEventListener('click', async()=>{
    const code=document.getElementById('cc-sess-code').value.trim(); if(!code) return;
    const data={code,date:document.getElementById('cc-sess-date').value,sessionNum:document.getElementById('cc-sess-num').value,type:document.getElementById('cc-sess-type').value,topic:document.getElementById('cc-sess-topic').value.trim(),content:document.getElementById('cc-sess-content').value.trim(),next:document.getElementById('cc-sess-next').value.trim()};
    if(editingSessionId){ const s=sessions.find(x=>x.id===editingSessionId); if(s) Object.assign(s,data); }
    else sessions.push({id:uid(),...data,created:Date.now()});
    resetSessionForm(); await saveSessions(); renderSessions();
  });

  // ── SUPERVISION ────────────────────────────────────────────────────────────
  function resetSupForm() {
    editingSupervisedId = null;
    ['cc-sup-name','cc-sup-case','cc-sup-feedback','cc-sup-insight','cc-sup-action'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('cc-sup-save-btn').textContent='수퍼비전 기록 저장';
    document.getElementById('cc-sup-cancel-btn').style.display='none';
  }
  function renderSupervisions() {
    const root=document.getElementById('cc-sup-list'); if(!root) return;
    const sorted=[...supervisions].sort((a,b)=>b.created-a.created);
    root.innerHTML=sorted.length?sorted.map((s,i)=>`
      <div class="cc-sup-card">
        <div class="cc-sess-head">
          <span style="font-size:12px;font-weight:700;color:var(--rose);">${i+1}.</span>
          <span class="cc-sess-code">${s.date||''}</span>
          ${s.supervisor?`<span class="cc-sess-meta">· ${escapeHtml(s.supervisor)}</span>`:''}
          ${s.caseRef?`<span class="cc-sess-type-badge">${escapeHtml(s.caseRef)}</span>`:''}
          <span class="cc-note-spacer"></span>
          <span style="font-size:11px;color:var(--ink-soft);">${s.created?formatDateTime(s.created):''}</span>
          <button class="cc-del-btn" data-supedit="${s.id}" style="color:var(--sage);opacity:1">수정</button>
          <button class="cc-del-btn" data-supdel="${s.id}">삭제</button>
        </div>
        ${s.feedback?`<div class="cc-sess-section-label">피드백</div><div class="cc-sess-section">${escapeHtml(s.feedback)}</div>`:''}
        ${s.insight?`<div class="cc-sess-section-label">나의 통찰</div><div class="cc-sess-section">${escapeHtml(s.insight)}</div>`:''}
        ${s.action?`<div class="cc-sess-section-label">실천 계획</div><div class="cc-sess-section">${escapeHtml(s.action)}</div>`:''}
      </div>`).join(''):'<div class="cc-empty">아직 수퍼비전 기록이 없어요.</div>';
    root.querySelectorAll('[data-supedit]').forEach(el=>{
      el.addEventListener('click',()=>{ const s=supervisions.find(x=>x.id===el.getAttribute('data-supedit')); if(!s) return;
        editingSupervisedId=s.id;
        document.getElementById('cc-sup-date').value=s.date||'';
        document.getElementById('cc-sup-name').value=s.supervisor||'';
        document.getElementById('cc-sup-case').value=s.caseRef||'';
        document.getElementById('cc-sup-feedback').value=s.feedback||'';
        document.getElementById('cc-sup-insight').value=s.insight||'';
        document.getElementById('cc-sup-action').value=s.action||'';
        document.getElementById('cc-sup-save-btn').textContent='수정 완료';
        document.getElementById('cc-sup-cancel-btn').style.display='';
        document.getElementById('cc-sup-feedback').scrollIntoView({behavior:'smooth',block:'center'});
      });
    });
    root.querySelectorAll('[data-supdel]').forEach(el=>{ el.addEventListener('click',async()=>{ supervisions=supervisions.filter(s=>s.id!==el.getAttribute('data-supdel')); await saveSupervisions(); renderSupervisions(); }); });
  }
  document.getElementById('cc-sup-cancel-btn') && document.getElementById('cc-sup-cancel-btn').addEventListener('click', resetSupForm);
  document.getElementById('cc-sup-save-btn') && document.getElementById('cc-sup-save-btn').addEventListener('click', async()=>{
    const feedback=document.getElementById('cc-sup-feedback').value.trim(); if(!feedback) return;
    const data={date:document.getElementById('cc-sup-date').value,supervisor:document.getElementById('cc-sup-name').value.trim(),caseRef:document.getElementById('cc-sup-case').value.trim(),feedback,insight:document.getElementById('cc-sup-insight').value.trim(),action:document.getElementById('cc-sup-action').value.trim()};
    if(editingSupervisedId){ const s=supervisions.find(x=>x.id===editingSupervisedId); if(s) Object.assign(s,data); }
    else supervisions.push({id:uid(),...data,created:Date.now()});
    resetSupForm(); await saveSupervisions(); renderSupervisions();
  });

  // ── CASE CONCEPTUALIZATION ─────────────────────────────────────────────────
  const CON_FIELDS = {
    psycho: ['방어기제 유형','전이/역전이 가능성','초기 경험/핵심 상처','자아 기능 수준'],
    jung:   ['주요 원형(페르소나/그림자 등)','개인무의식 콤플렉스','자아-자기 관계','개인화 과제'],
    adler:  ['열등감 주제','생활양식','가족 구도/출생순위','사회적 관심 수준'],
    ta:     ['지배적 자아상태(P/A/C)','교류 패턴','인생각본','스트로크 패턴','인생태도'],
    cbt:    ['자동적 사고','핵심 신념','인지 왜곡 유형','행동 패턴'],
    person: ['자기개념 일치도','무조건적 수용 경험','현재 경험 태도','성장 방향'],
    exist:  ['실존적 불안 주제','자유와 책임 태도','의미/가치','죽음 인식'],
    family: ['가족 규칙','삼각관계','경계','의사소통 패턴'],
    sfbt:   ['예외 상황','강점/자원','기적 이후 모습','척도(현재/목표)'],
    reality:['기본욕구 좌절 영역','현재 행동 선택','자기평가','원하는 삶'],
    gestalt:['미해결과제','알아차림 수준','접촉 경계 장애','신체 반응'],
  };
  const conTheoryLabel = {psycho:'정신역동',jung:'분석심리학(융)',adler:'아들러',ta:'교류분석(TA)',cbt:'CBT',person:'인간중심',exist:'실존주의',family:'가족체계',sfbt:'해결중심',reality:'현실치료',gestalt:'게슈탈트'};
  function updateConFields() {
    const theory=document.getElementById('cc-con-theory')&&document.getElementById('cc-con-theory').value;
    const wrap=document.getElementById('cc-con-fields'); if(!wrap) return;
    const fields=CON_FIELDS[theory]||[];
    wrap.innerHTML=fields.map(f=>`<label class="cc-form-label">${escapeHtml(f)}</label><textarea data-confield="${escapeHtml(f)}" style="min-height:50px;width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--body);box-sizing:border-box;outline:none;margin-bottom:8px;" placeholder="${escapeHtml(f)} 관련 내용…"></textarea>`).join('');
  }
  document.getElementById('cc-con-theory')&&document.getElementById('cc-con-theory').addEventListener('change',updateConFields);
  setTimeout(updateConFields,100);
  function resetConForm() {
    editingConceptId = null;
    document.getElementById('cc-con-code').value=''; document.getElementById('cc-con-goal').value='';
    document.querySelectorAll('[data-confield]').forEach(el=>el.value='');
    document.getElementById('cc-con-save-btn').textContent='사례개념화 저장';
    document.getElementById('cc-con-cancel-btn').style.display='none';
  }
  function renderConcepts() {
    const root=document.getElementById('cc-con-list'); if(!root) return;
    const sorted=[...concepts].sort((a,b)=>b.created-a.created);
    root.innerHTML=sorted.length?sorted.map((c,i)=>`
      <div class="cc-con-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
          <span style="font-size:12px;font-weight:700;color:var(--rose);">${i+1}.</span>
          <span style="font-weight:700;font-size:15px;color:var(--ink);">${escapeHtml(c.code)}</span>
          <span class="cc-con-theory-badge">${conTheoryLabel[c.theory]||c.theory}</span>
          <span class="cc-note-spacer"></span>
          <span style="font-size:11px;color:var(--ink-soft);">${formatDateTime(c.created)}</span>
          <button class="cc-del-btn" data-conedit="${c.id}" style="color:var(--sage);opacity:1">수정</button>
          <button class="cc-del-btn" data-condel="${c.id}">삭제</button>
        </div>
        ${Object.entries(c.fields||{}).filter(([k,v])=>v).map(([k,v])=>`<div class="cc-con-field"><div class="cc-con-field-label">${escapeHtml(k)}</div><div class="cc-con-field-text">${escapeHtml(v)}</div></div>`).join('')}
        ${c.goal?`<div class="cc-con-field"><div class="cc-con-field-label">개입 방향/목표</div><div class="cc-con-field-text">${escapeHtml(c.goal)}</div></div>`:''}
      </div>`).join(''):'<div class="cc-empty">아직 사례개념화 기록이 없어요.</div>';
    root.querySelectorAll('[data-conedit]').forEach(el=>{
      el.addEventListener('click',()=>{ const c=concepts.find(x=>x.id===el.getAttribute('data-conedit')); if(!c) return;
        editingConceptId=c.id;
        document.getElementById('cc-con-code').value=c.code||'';
        document.getElementById('cc-con-theory').value=c.theory||'psycho';
        updateConFields();
        setTimeout(()=>{ Object.entries(c.fields||{}).forEach(([k,v])=>{ const f=document.querySelector(`[data-confield="${k}"]`); if(f) f.value=v; }); },50);
        document.getElementById('cc-con-goal').value=c.goal||'';
        document.getElementById('cc-con-save-btn').textContent='수정 완료';
        document.getElementById('cc-con-cancel-btn').style.display='';
        document.getElementById('cc-con-code').scrollIntoView({behavior:'smooth',block:'center'});
      });
    });
    root.querySelectorAll('[data-condel]').forEach(el=>{ el.addEventListener('click',async()=>{ concepts=concepts.filter(c=>c.id!==el.getAttribute('data-condel')); await saveConcepts(); renderConcepts(); }); });
  }
  document.getElementById('cc-con-cancel-btn')&&document.getElementById('cc-con-cancel-btn').addEventListener('click', resetConForm);
  document.getElementById('cc-con-save-btn')&&document.getElementById('cc-con-save-btn').addEventListener('click',async()=>{
    const code=document.getElementById('cc-con-code').value.trim(); if(!code) return;
    const theory=document.getElementById('cc-con-theory').value;
    const fields={};
    document.querySelectorAll('[data-confield]').forEach(el=>{ if(el.value.trim()) fields[el.getAttribute('data-confield')]=el.value.trim(); });
    const goal=document.getElementById('cc-con-goal').value.trim();
    if(editingConceptId){ const c=concepts.find(x=>x.id===editingConceptId); if(c) Object.assign(c,{code,theory,fields,goal}); }
    else concepts.push({id:uid(),code,theory,fields,goal,created:Date.now()});
    resetConForm(); await saveConcepts(); renderConcepts();
  });

  // ── SELF-CARE ──────────────────────────────────────────────────────────────
  const stressLabels=['','매우 낮음','낮음','보통','높음','매우 높음'];
  const moodEmoji=['','😞','😕','😐','🙂','😄'];
  document.getElementById('cc-sc-sleep')&&document.getElementById('cc-sc-sleep').addEventListener('input',e=>{ document.getElementById('cc-sc-sleep-val').textContent=e.target.value+'시간'; });
  document.getElementById('cc-sc-stress')&&document.getElementById('cc-sc-stress').addEventListener('input',e=>{ document.getElementById('cc-sc-stress-val').textContent=stressLabels[e.target.value]||e.target.value; });
  document.querySelectorAll('#cc-sc-activity .cc-sc-chip').forEach(btn=>{ btn.addEventListener('click',()=>{ const v=btn.getAttribute('data-val'); btn.classList.toggle('on'); if(btn.classList.contains('on'))scSelectedActivity.push(v); else scSelectedActivity=scSelectedActivity.filter(x=>x!==v); }); });
  document.querySelectorAll('#cc-sc-social .cc-sc-chip').forEach(btn=>{ btn.addEventListener('click',()=>{ const v=btn.getAttribute('data-val'); btn.classList.toggle('on'); if(btn.classList.contains('on'))scSelectedSocial.push(v); else scSelectedSocial=scSelectedSocial.filter(x=>x!==v); }); });
  document.querySelectorAll('.cc-sc-mood-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ scSelectedMood=Number(btn.getAttribute('data-mood')); document.querySelectorAll('.cc-sc-mood-btn').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }); });
  function renderSelfcareToday() {}
  function renderSelfcareHistory() {
    const root=document.getElementById('cc-sc-history'); if(!root) return;
    const entries=Object.entries(selfcareLog).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
    root.innerHTML=entries.length?`<div class="cc-notes-meta-bar" style="margin-bottom:8px"><span>최근 기록</span></div>`+entries.map(([date,log],i)=>`
      <div class="cc-sc-history-card">
        <div class="cc-sc-history-date">${date}</div>
        <div class="cc-sc-history-mood">${moodEmoji[log.mood]||'•'}</div>
        <div class="cc-sc-history-detail">
          😴 ${log.sleep||0}h &nbsp;|&nbsp; 🔥 ${stressLabels[log.stress]||log.stress}
          ${log.note?`<br>${escapeHtml(log.note)}`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <button class="cc-del-btn" data-scedit="${date}" style="color:var(--sage);opacity:1">수정</button>
          <button class="cc-del-btn" data-scdel="${date}">삭제</button>
        </div>
      </div>`).join(''):'<div class="cc-empty">아직 자기돌봄 기록이 없어요. 오늘 체크인을 해보세요!</div>';
    root.querySelectorAll('[data-scedit]').forEach(el=>{
      el.addEventListener('click',()=>{
        const date=el.getAttribute('data-scedit');
        const log=selfcareLog[date]; if(!log) return;
        editingSelfcareKey=date;
        document.getElementById('cc-sc-sleep').value=log.sleep||7;
        document.getElementById('cc-sc-sleep-val').textContent=(log.sleep||7)+'시간';
        document.getElementById('cc-sc-stress').value=log.stress||2;
        document.getElementById('cc-sc-stress-val').textContent=stressLabels[log.stress||2];
        document.getElementById('cc-sc-note').value=log.note||'';
        scSelectedMood=log.mood||0;
        document.querySelectorAll('.cc-sc-mood-btn').forEach(b=>b.classList.toggle('on',Number(b.getAttribute('data-mood'))===scSelectedMood));
        scSelectedActivity=[...(log.activity||[])];
        document.querySelectorAll('#cc-sc-activity .cc-sc-chip').forEach(b=>b.classList.toggle('on',scSelectedActivity.includes(b.getAttribute('data-val'))));
        scSelectedSocial=[...(log.social||[])];
        document.querySelectorAll('#cc-sc-social .cc-sc-chip').forEach(b=>b.classList.toggle('on',scSelectedSocial.includes(b.getAttribute('data-val'))));
        document.getElementById('cc-sc-save-btn').textContent=`${date} 수정 완료`;
        document.getElementById('cc-sc-save-btn').scrollIntoView({behavior:'smooth',block:'center'});
      });
    });
    root.querySelectorAll('[data-scdel]').forEach(el=>{ el.addEventListener('click',async()=>{ delete selfcareLog[el.getAttribute('data-scdel')]; await saveSelfcareLog(); renderSelfcareHistory(); }); });
  }
  document.getElementById('cc-sc-save-btn')&&document.getElementById('cc-sc-save-btn').addEventListener('click',async()=>{
    const key=editingSelfcareKey||todayKey();
    selfcareLog[key]={sleep:Number(document.getElementById('cc-sc-sleep').value)||7,mood:scSelectedMood,stress:Number(document.getElementById('cc-sc-stress').value)||2,activity:[...scSelectedActivity],social:[...scSelectedSocial],note:document.getElementById('cc-sc-note').value.trim()};
    document.getElementById('cc-sc-note').value='';
    document.getElementById('cc-sc-save-btn').textContent='오늘 기록 저장';
    editingSelfcareKey=null;
    await saveSelfcareLog(); renderSelfcareHistory(); showToast('자기돌봄 저장됨 ✓');
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  function formatDate(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatDateTime(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  loadData();
})();
</script>

</body>
</html>
