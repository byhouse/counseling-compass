<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Counseling Compass</title>
<meta name="description" content="상담자가 되어가는 평생 학습 시스템">
<meta name="theme-color" content="#2b3a55">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Compass">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  html,body{margin:0;padding:0;background:#eef0f2;min-height:100vh;-webkit-tap-highlight-color:transparent;}
  body{padding:12px;box-sizing:border-box;}
</style>
</head>
<body>
<div id="cc-root">
<style>
  #cc-root {
    --ink: #2b3a55;
    --ink-soft: #5a6580;
    --paper: #eef0f2;
    --paper-raised: #ffffff;
    --rose: #c2685a;
    --rose-soft: #e8d3cd;
    --sage: #6b8f71;
    --sage-soft: #dbe6dc;
    --line: #d7d9e0;
    --display: ui-serif, Georgia, "Times New Roman", serif;
    --body: ui-sans-serif, -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    font-family: var(--body);
    color: var(--ink);
    background: var(--paper);
    border-radius: 16px;
    padding: 0;
    max-width: 760px;
    margin: 0 auto;
    box-sizing: border-box;
    overflow: hidden;
  }
  #cc-root *, #cc-root *::before, #cc-root *::after { box-sizing: border-box; }

  .cc-header {
    padding: 28px 28px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    border-bottom: 1px solid var(--line);
  }
  .cc-compass {
    width: 56px; height: 56px; flex: 0 0 auto;
  }
  .cc-needle {
    transform-origin: 50px 50px;
    transition: transform 1.1s cubic-bezier(.34,1.56,.64,1);
  }
  .cc-title-block { flex: 1; min-width: 0; }
  .cc-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
  }
  .cc-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
  }

  .cc-tabs-wrap {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 14px 28px 0; background: var(--paper); gap: 8px;
  }
  .cc-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .cc-tab {
    font-family: var(--body);
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 10px 10px 0 0;
    position: relative;
    top: 1px;
    display: flex; align-items: center; gap: 4px;
  }
  .cc-tab.active {
    color: var(--ink);
    background: var(--paper-raised);
    box-shadow: 0 -1px 0 var(--line), 1px 0 0 var(--line), -1px 0 0 var(--line);
  }
  .cc-tab-order-btn {
    background: none; border: none; color: var(--ink-soft); cursor: pointer;
    font-size: 10px; padding: 1px 2px; opacity: 0.6;
  }
  .cc-tab-order-btn:hover { opacity: 1; color: var(--ink); }
  .cc-tab-order-btn:disabled { opacity: 0.15; cursor: default; }
  .cc-tabs-edit-btn {
    font-family: var(--body); font-size: 11.5px; font-weight: 600; color: var(--ink-soft);
    background: var(--paper-raised); border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 10px; cursor: pointer; white-space: nowrap; margin-bottom: 6px;
  }
  .cc-tabs-edit-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .cc-panel {
    background: var(--paper-raised);
    padding: 24px 28px 28px;
    min-height: 320px;
  }
  .cc-hidden { display: none !important; }

  /* Planner */
  .cc-subject {
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .cc-subject-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: #f7f7f9;
    cursor: pointer;
  }
  .cc-subject-name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 16px;
    flex: 1;
  }
  .cc-progress-wrap {
    width: 84px;
    height: 6px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .cc-progress-bar {
    height: 100%;
    background: var(--sage);
    transition: width .4s ease;
  }
  .cc-progress-pct {
    font-size: 12px;
    color: var(--ink-soft);
    width: 36px;
    text-align: right;
    flex: 0 0 auto;
  }
  .cc-caret { font-size: 11px; color: var(--ink-soft); transition: transform .2s; flex: 0 0 auto; }
  .cc-subject.collapsed .cc-caret { transform: rotate(-90deg); }
  .cc-subject.collapsed .cc-topics { display: none; }
  .cc-topics { padding: 6px 16px 12px; }
  .cc-topic {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid #f0f0f3;
    font-size: 14px;
  }
  .cc-topic:last-child { border-bottom: none; }
  .cc-topic input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--sage);
    flex: 0 0 auto;
    cursor: pointer;
  }
  .cc-topic span.done { text-decoration: none; color: var(--ink); }
  .cc-subject--grad .cc-topic span.done { text-decoration: none; color: var(--ink); }
  .cc-topic-text { flex: 1; }
  .cc-del-btn {
    background: none; border: none; color: var(--ink-soft);
    cursor: pointer; font-size: 13px; padding: 2px 6px; opacity: 0.5;
  }
  .cc-del-btn:hover { opacity: 1; color: var(--rose); }
  .cc-add-row {
    display: flex; gap: 8px; padding: 8px 16px 14px;
  }
  .cc-add-row input {
    flex: 1; border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 10px; font-size: 13px; font-family: var(--body);
  }
  .cc-add-row button {
    border: none; background: var(--ink); color: white;
    border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer;
    font-family: var(--body);
  }
  .cc-new-subject {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .cc-new-subject input {
    flex: 1; border: 1px dashed var(--line); border-radius: 10px;
    padding: 10px 14px; font-size: 14px; font-family: var(--body);
    background: transparent;
  }
  .cc-new-subject button {
    border: 1px solid var(--ink); background: transparent; color: var(--ink);
    border-radius: 10px; padding: 10px 16px; font-size: 13px; cursor: pointer; font-weight: 600;
  }

  /* Notes */
  .cc-note-form {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 18px;
  }
  .cc-tag-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .cc-tag-btn {
    border: 1px solid var(--line); background: var(--paper);
    border-radius: 999px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    color: var(--ink-soft); font-family: var(--body); font-weight: 600;
  }
  .cc-tag-btn.selected { background: var(--ink); color: white; border-color: var(--ink); }
  .cc-note-form textarea {
    width: 100%; border: none; resize: vertical; min-height: 160px;
    font-family: var(--body); font-size: 14px; color: var(--ink);
    background: transparent; outline: none; line-height: 1.5;
  }
  .cc-note-form-foot { display: flex; justify-content: flex-end; margin-top: 6px; }
  .cc-note-form-foot button {
    border: none; background: var(--rose); color: white;
    border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600;
  }

  .cc-filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }

  .cc-note-card {
    border-left: 3px solid var(--rose);
    background: #faf9f7;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .cc-note-card.tag-question { border-left-color: var(--sage); }
  .cc-note-card.tag-thought { border-left-color: var(--ink-soft); }
  .cc-note-meta {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .cc-note-tag {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    background: var(--rose-soft); color: var(--rose);
  }
  .cc-note-card.tag-question .cc-note-tag { background: var(--sage-soft); color: var(--sage); }
  .cc-note-card.tag-thought .cc-note-tag { background: #e5e5ea; color: var(--ink-soft); }
  .cc-note-date { font-size: 11px; color: var(--ink-soft); }
  .cc-note-spacer { flex: 1; }
  .cc-note-text {
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .cc-empty {
    text-align: center; color: var(--ink-soft); font-size: 13px; padding: 40px 10px;
  }
  .cc-loading { text-align: center; padding: 40px; color: var(--ink-soft); font-size: 13px; }

  /* Graduation tracking */
  .cc-grad-track {
    background: var(--paper-raised); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 16px;
  }
  .cc-grad-track-title { font-family: var(--display); font-weight: 700; font-size: 15px; margin-bottom: 12px; color: var(--ink); }
  .cc-grad-bar-row { margin-bottom: 10px; }
  .cc-grad-bar-label { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 4px; }
  .cc-grad-bar-label strong { color: var(--ink); }
  .cc-grad-bar-wrap { height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .cc-grad-bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .cc-grad-bar-fill.total { background: var(--ink); }
  .cc-grad-bar-fill.req   { background: var(--rose); }
  .cc-grad-bar-fill.adv   { background: var(--sage); }
  .cc-course-type { font-size: 10.5px; font-weight: 700; padding: 1px 6px; border-radius: 999px; flex: 0 0 auto; }
  .cc-course-type.req  { background: #fde8e5; color: var(--rose); }
  .cc-course-type.adv  { background: var(--sage-soft); color: var(--sage); }
  .cc-course-type.elec { background: #e9eaf2; color: var(--ink-soft); }

  /* Qual progress bar */
  .cc-qual-prog-wrap { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-top: 4px; margin-bottom: 10px; }
  .cc-qual-prog-fill { height: 100%; border-radius: 3px; background: var(--sage); transition: width .4s ease; }
  .cc-qual-prog-fill.done { background: var(--sage); }
  .cc-qual-prog-fill.warn { background: var(--rose); }
  .cc-qual-pct { font-size: 11.5px; font-weight: 700; }
  .cc-qual-pct.done { color: var(--sage); }
  .cc-qual-pct.warn { color: var(--rose); }

  /* Tracker progress */
  .cc-tracker-prog { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cc-tracker-prog-bar { flex: 1; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .cc-tracker-prog-fill { height: 100%; background: var(--sage); border-radius: 4px; transition: width .4s ease; }
  .cc-tracker-pct { font-size: 12px; font-weight: 700; color: var(--sage); min-width: 36px; text-align: right; }

  .cc-credits-total {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--ink); color: white; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 13.5px;
  }
  .cc-credits-total-num {
    font-family: var(--display); font-size: 26px; font-weight: 700; color: #fff;
  }
  .cc-credits-breakdown { font-size: 12px; color: rgba(255,255,255,0.7); flex: 1; }
  .cc-credit-badge {
    font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 999px;
    background: var(--sage-soft); color: var(--sage); flex: 0 0 auto;
    margin-left: 2px;
  }
  .cc-subject-credits {
    font-size: 12px; color: var(--ink-soft); margin-left: 4px; font-weight: 600;
  }
  .cc-add-row input.credits-input {
    flex: 0 0 52px; width: 52px; text-align: center;
  }
  .cc-add-row label.credits-label {
    font-size: 12px; color: var(--ink-soft); white-space: nowrap;
  }

  .cc-topic { flex-wrap: wrap; }
  .cc-topic-memo {
    flex-basis: 100%;
    margin: 4px 0 2px 28px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12.5px;
    font-family: var(--body);
    color: var(--ink-soft);
    background: #fbfbfb;
    resize: vertical;
    min-height: 30px;
    display: none;
  }
  .cc-topic-memo.show { display: block; }
  .cc-memo-toggle {
    background: none; border: none; color: var(--ink-soft);
    cursor: pointer; font-size: 12px; padding: 2px 4px; opacity: 0.55; flex: 0 0 auto;
  }
  .cc-memo-toggle:hover { opacity: 1; color: var(--ink); }
  .cc-memo-toggle.has-memo { opacity: 1; color: var(--rose); }

  /* Daily check tab */
  .cc-streak-banner {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 18px;
  }
  .cc-streak-num {
    font-family: var(--display); font-size: 32px; font-weight: 700; color: var(--rose);
  }
  .cc-streak-label { font-size: 13px; color: var(--ink-soft); }
  .cc-month-nav {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .cc-month-nav button {
    border: 1px solid var(--line); background: var(--paper-raised); border-radius: 8px;
    width: 30px; height: 30px; cursor: pointer; font-size: 14px; color: var(--ink-soft);
  }
  .cc-month-label { font-family: var(--display); font-weight: 600; font-size: 15px; }
  .cc-cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
  }
  .cc-cal-dow {
    text-align: center; font-size: 11px; color: var(--ink-soft); font-weight: 600; padding-bottom: 4px;
  }
  .cc-cal-day {
    aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; color: var(--ink-soft); background: var(--paper-raised);
    position: relative; user-select: none;
  }
  .cc-cal-day.empty { border: none; cursor: default; visibility: hidden; }
  .cc-cal-day.today { box-shadow: 0 0 0 2px var(--ink) inset; font-weight: 700; }
  .cc-cal-day.studied { background: var(--sage); border-color: var(--sage); color: white; font-weight: 700; }
  .cc-cal-day.future { opacity: 0.35; cursor: default; }
  .cc-daylog-box {
    margin-top: 18px; border: 1px solid var(--line); border-radius: 12px; padding: 14px;
  }
  .cc-daylog-box textarea {
    width: 100%; border: none; resize: vertical; min-height: 60px;
    font-family: var(--body); font-size: 13.5px; color: var(--ink); background: transparent; outline: none; line-height: 1.5;
  }
  .cc-daylog-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .cc-daylog-date { font-size: 13px; font-weight: 700; }
  .cc-daylog-toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-soft); }
  .cc-daylog-toggle-wrap input { width: 16px; height: 16px; accent-color: var(--sage); cursor: pointer; }
  .cc-daylog-save {
    border: none; background: var(--ink); color: white; border-radius: 8px;
    padding: 7px 14px; font-size: 12.5px; cursor: pointer; margin-top: 6px; font-family: var(--body);
  }

  /* Reorder buttons */
  .cc-order-btns { display: flex; flex-direction: column; gap: 1px; flex: 0 0 auto; }
  .cc-order-btn {
    background: none; border: none; color: var(--ink-soft); cursor: pointer;
    font-size: 9px; line-height: 1; padding: 1px 3px; opacity: 0.5;
  }
  .cc-order-btn:hover { opacity: 1; color: var(--ink); }
  .cc-order-btn:disabled { opacity: 0.15; cursor: default; }

  /* Qualification checklist */
  .cc-qual-org {
    border: 1px solid var(--line); border-radius: 12px; margin-bottom: 16px; overflow: hidden;
  }
  .cc-qual-head {
    padding: 14px 16px; background: #f7f7f9; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .cc-qual-title { font-family: var(--display); font-weight: 600; font-size: 15px; flex: 1; }
  .cc-qual-sub { font-size: 11.5px; color: var(--ink-soft); }
  .cc-qual-body { padding: 4px 16px 16px; }
  .cc-qual-group-label {
    font-size: 12px; font-weight: 700; color: var(--ink-soft); margin: 12px 0 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .cc-qual-count {
    font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 999px;
    background: var(--sage-soft); color: var(--sage);
  }
  .cc-qual-count.short { background: #f0e3d9; color: var(--rose); }
  .cc-qual-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 2px; font-size: 13.5px;
  }
  .cc-qual-item input { width: 17px; height: 17px; accent-color: var(--sage); cursor: pointer; flex: 0 0 auto; }
  .cc-qual-item span.checked { color: var(--ink-soft); }
  .cc-qual-note {
    font-size: 11.5px; color: var(--ink-soft); line-height: 1.6; margin-top: 10px;
    padding-top: 10px; border-top: 1px dashed var(--line);
  }
  .cc-qual-ref {
    border: 1px solid var(--sage); background: var(--sage-soft); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 18px; font-size: 13px;
  }
  .cc-qual-ref-title { font-weight: 700; color: var(--ink); margin-bottom: 6px; font-size: 12.5px; }
  .cc-qual-ref-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .cc-qual-ref-chip {
    background: var(--paper-raised); border-radius: 999px; padding: 4px 10px;
    font-size: 12px; color: var(--ink); border: 1px solid var(--line);
  }
  .cc-qual-track-row {
    display: flex; align-items: flex-start; gap: 8px; padding: 6px 2px; font-size: 13px;
  }
  .cc-qual-track-row input { width: 17px; height: 17px; accent-color: var(--sage); cursor: pointer; flex: 0 0 auto; margin-top: 2px; }
  .cc-qual-track-row span.checked { color: var(--ink-soft); }
  .cc-qual-track-wrap { padding: 6px 0; border-bottom: 1px solid #f0f0f3; }
  .cc-qual-track-wrap:last-of-type { border-bottom: none; }
  .cc-qual-track-note {
    width: 100%; margin: 4px 0 2px 25px; box-sizing: border-box;
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px;
    font-size: 12.5px; font-family: var(--body); color: var(--ink);
    background: #fbfbfb; outline: none;
  }
  .cc-qual-track-note:focus { border-color: var(--sage); background: white; }
  .cc-qual-cite {
    font-size: 12.5px; line-height: 1.6; color: var(--ink);
    background: var(--rose-soft); border-left: 3px solid var(--rose);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 14px;
  }

  .cc-qual-item-wrap { border-bottom: 1px solid #f0f0f3; padding-bottom: 2px; }
  .cc-qual-item-wrap:last-child { border-bottom: none; }
  .cc-qual-item { display: flex; align-items: center; gap: 8px; padding: 6px 2px; font-size: 13.5px; border-bottom: none; }
  .cc-qual-expand-btn {
    margin-left: auto; background: none; border: none; color: var(--ink-soft);
    font-size: 11px; cursor: pointer; padding: 2px 4px; font-family: var(--body); white-space: nowrap;
  }
  .cc-qual-expand-btn:hover { color: var(--ink); }
  .cc-qual-examples {
    display: flex; flex-wrap: wrap; gap: 5px; padding: 2px 2px 10px 25px;
  }

  .cc-toast {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: white; font-size: 12.5px; font-weight: 600;
    padding: 8px 16px; border-radius: 999px; opacity: 0; transition: all .25s ease;
    pointer-events: none; z-index: 50; white-space: nowrap;
  }
  .cc-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* D-Day */
  .cc-dday-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 28px 0; background: var(--paper); }
  .cc-dday-chip { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 999px; background: var(--ink); color: white; }
  .cc-dday-chip.soon { background: var(--rose); }
  .cc-dday-chip.today { background: var(--sage); }
  .cc-dday-chip .cc-dday-del { background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 11px; padding: 0 0 0 4px; }

  function renderTabs() {
    const row = document.getElementById('cc-tabs-row');
    row.innerHTML = tabOrder.map((key, idx) => `
      <button class="cc-tab ${key === activeTab ? 'active' : ''}" data-tabkey="${key}">
        ${tabEditMode ? `<span class="cc-tab-order-btn" data-tabprev="${key}" ${idx === 0 ? 'style="visibility:hidden"' : ''}>◀</span>` : ''}
        ${escapeHtml(TAB_DEFS[key])}
        ${tabEditMode ? `<span class="cc-tab-order-btn" data-tabnext="${key}" ${idx === tabOrder.length - 1 ? 'style="visibility:hidden"' : ''}>▶</span>` : ''}
      </button>
    `).join('');

    row.querySelectorAll('[data-tabkey]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (e.target.hasAttribute('data-tabprev') || e.target.hasAttribute('data-tabnext')) return;
        if (tabEditMode) return;
        activeTab = btn.getAttribute('data-tabkey');
        renderTabs();
        showActivePanel();
      });
    });
    row.querySelectorAll('[data-tabprev]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const key = el.getAttribute('data-tabprev');
        const idx = tabOrder.indexOf(key);
        if (idx <= 0) return;
        [tabOrder[idx - 1], tabOrder[idx]] = [tabOrder[idx], tabOrder[idx - 1]];
        await saveTabOrder();
        renderTabs();
      });
    });
    row.querySelectorAll('[data-tabnext]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const key = el.getAttribute('data-tabnext');
        const idx = tabOrder.indexOf(key);
        if (idx >= tabOrder.length - 1) return;
        [tabOrder[idx], tabOrder[idx + 1]] = [tabOrder[idx + 1], tabOrder[idx]];
        await saveTabOrder();
        renderTabs();
      });
    });
  }

  function updateCompass() {
    let total = 0, done = 0;
    subjects.forEach(s => { total += s.topics.length; done += s.topics.filter(t => t.done).length; });
    const topicPct = total ? done / total : 0;
    const noteScore = Math.min(notes.length / 10, 1);
    const studyDays = Object.values(dailyLogs).filter(v => v.studied).length;
    const dayScore = Math.min(studyDays / 20, 1);
    const overall = (topicPct * 0.5 + noteScore * 0.2 + dayScore * 0.3);
    const angle = -90 + overall * 180;
    document.getElementById('cc-needle').setAttribute('transform', `rotate(${angle} 50 50)`);
  }

  function computeStreak() {
    let streak = 0;
    let d = new Date();
    // if today not studied yet, streak counts back from yesterday
    if (!(dailyLogs[dateKey(d)] && dailyLogs[dateKey(d)].studied)) {
      d.setDate(d.getDate() - 1);
    }
    while (dailyLogs[dateKey(d)] && dailyLogs[dateKey(d)].studied) {
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  function renderStreak() {
    document.getElementById('cc-streak-num').textContent = computeStreak();
  }

  function renderCalendar() {
    const year = calViewDate.getFullYear();
    const month = calViewDate.getMonth();
    document.getElementById('cc-month-label').textContent = `${year}년 ${month+1}월`;
    const grid = document.getElementById('cc-cal-grid');
    const dows = ['일','월','화','수','목','금','토'];
    let html = dows.map(d => `<div class="cc-cal-dow">${d}</div>`).join('');
    const firstDay = new Date(year, month, 1);
    const startOffset = firstDay.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const tKey = todayKey();
    for (let i = 0; i < startOffset; i++) html += `<div class="cc-cal-day empty"></div>`;
    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(year, month, day);
      const key = dateKey(d);
      const isFuture = key > tKey;
      const studied = dailyLogs[key] && dailyLogs[key].studied;
      const cls = ['cc-cal-day'];
      if (key === tKey) cls.push('today');
      if (studied) cls.push('studied');
      if (isFuture) cls.push('future');
      html += `<div class="${cls.join(' ')}" data-day="${key}">${day}</div>`;
    }
    grid.innerHTML = html;
    grid.querySelectorAll('[data-day]').forEach(el => {
      el.addEventListener('click', () => {
        if (el.classList.contains('future')) return;
        selectDay(el.getAttribute('data-day'));
      });
    });
  }

  function selectDay(key) {
    selectedDay = key;
    const log = dailyLogs[key] || { studied: false, memo: '' };
    const d = new Date(key + 'T00:00:00');
    const label = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${['일','월','화','수','목','금','토'][d.getDay()]})`;
    document.getElementById('cc-daylog-date').textContent = label;
    document.getElementById('cc-daylog-checkbox').checked = !!log.studied;
    document.getElementById('cc-daylog-memo').value = log.memo || '';
    const delBtn = document.getElementById('cc-daylog-delete-btn');
    if (delBtn) delBtn.style.display = dailyLogs[key] ? '' : 'none';
  }

  function subjectProgress(s) {
    if (!s.topics.length) return 0;
    return Math.round((s.topics.filter(t => t.done).length / s.topics.length) * 100);
  }

  function renderGradTrack() {
    const el = document.getElementById('cc-grad-track');
    if (!el) return;
    const gradSubjects = subjects.filter(s => s.name.includes('수강과목'));
    if (!gradSubjects.length) { el.style.display = 'none'; return; }
    el.style.display = '';

    let total = 0, reqTotal = 0, advTotal = 0;
    gradSubjects.forEach(s => s.topics.forEach(t => {
      const c = Number(t.credits) || 0;
      total += c;
      if (t.courseType === 'req') reqTotal += c;
      if (t.courseType === 'adv') advTotal += c;
    }));

    const GRAD_REQ = 30, REQ_MIN = 3, ADV_MIN = 9;
    const totalPct = Math.min(100, Math.round(total / GRAD_REQ * 100));
    const reqPct   = Math.min(100, Math.round(reqTotal / REQ_MIN * 100));
    const advPct   = Math.min(100, Math.round(advTotal / ADV_MIN * 100));

    el.innerHTML = `
      <div class="cc-grad-track-title">🎓 졸업 이수학점 현황</div>
      <div class="cc-grad-bar-row">
        <div class="cc-grad-bar-label"><span>총 이수학점 <strong>${total}학점</strong></span><span style="font-weight:700;color:var(--ink)">${totalPct}% <small style="font-weight:400;color:var(--ink-soft)">/ 30학점</small></span></div>
        <div class="cc-grad-bar-wrap"><div class="cc-grad-bar-fill total" style="width:${totalPct}%"></div></div>
      </div>
      <div class="cc-grad-bar-row">
        <div class="cc-grad-bar-label"><span>전공필수 <strong>${reqTotal}학점</strong></span><span style="font-weight:700;color:var(--rose)">${reqPct}% <small style="font-weight:400;color:var(--ink-soft)">/ 3학점 이상</small></span></div>

      </div>
      <div class="cc-grad-bar-row">
        <div class="cc-grad-bar-label"><span>전공심화 <strong>${advTotal}학점</strong></span><span style="font-weight:700;color:var(--sage)">${advPct}% <small style="font-weight:400;color:var(--ink-soft)">/ 9학점 이상</small></span></div>

          <input type="text" placeholder="새 항목 추가" data-newtopic="${s.id}" maxlength="60"/>
            ${isGrad ? `<label class="credits-label">학점 <input type="number" class="credits-input" data-newcredits="${s.id}" min="1" max="6" value="3"/></label>
              <select data-newcoursetype="${s.id}" style="border:1px solid var(--line);border-radius:8px;padding:7px 6px;font-size:12px;font-family:var(--body);">
                <option value="elec">전공선택</option>
                <option value="req">전공필수</option>
                <option value="adv">전공심화</option>
              </select>` : ''}
            <button data-addtopic="${s.id}">추가</button>
          </div>
        </div>
      </div>`;
    }).join('');

    root.querySelectorAll('[data-toggle]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
        el.closest('.cc-subject').classList.toggle('collapsed');
      });
    });
    root.querySelectorAll('[data-subjup],[data-subjdown]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = el.getAttribute('data-subjup') || el.getAttribute('data-subjdown');
        const idx = subjects.findIndex(s => s.id === id);
        const dir = el.hasAttribute('data-subjup') ? -1 : 1;
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= subjects.length) return;
        [subjects[idx], subjects[newIdx]] = [subjects[newIdx], subjects[idx]];
        await saveSubjects();
        renderSubjects();
      });
    });
    root.querySelectorAll('[data-topicup],[data-topicdown]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const key = el.getAttribute('data-topicup') || el.getAttribute('data-topicdown');
        const [sid, tid] = key.split('|');
        const s = subjects.find(x => x.id === sid);
        const idx = s.topics.findIndex(t => t.id === tid);
        const dir = el.hasAttribute('data-topicup') ? -1 : 1;
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= s.topics.length) return;
        [s.topics[idx], s.topics[newIdx]] = [s.topics[newIdx], s.topics[idx]];
        await saveSubjects();
        renderSubjects();
      });
    });
    root.querySelectorAll('[data-check]').forEach(el => {
      el.addEventListener('click', (e) => e.stopPropagation());
      el.addEventListener('change', async (e) => {
        const [sid, tid] = el.getAttribute('data-check').split('|');
        const s = subjects.find(x => x.id === sid);
        const t = s.topics.find(x => x.id === tid);
        t.done = el.checked;
        await saveSubjects();
        renderSubjects();
        updateCompass();
      });
    });
    root.querySelectorAll('[data-deltopic]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const [sid, tid] = el.getAttribute('data-deltopic').split('|');
        const s = subjects.find(x => x.id === sid);
        s.topics = s.topics.filter(x => x.id !== tid);
        await saveSubjects();
        renderSubjects();
        updateCompass();
      });
    });
    root.querySelectorAll('[data-memotoggle]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = el.getAttribute('data-memotoggle');
        const memoEl = root.querySelector(`[data-memo="${key}"]`);
        memoEl.classList.toggle('show');
        if (memoEl.classList.contains('show')) memoEl.focus();
      });
    });
    root.querySelectorAll('[data-memo]').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('blur', async () => {
        const [sid, tid] = el.getAttribute('data-memo').split('|');
        const s = subjects.find(x => x.id === sid);
        const t = s.topics.find(x => x.id === tid);
        t.memo = el.value;
        await saveSubjects();
        const toggleBtn = root.querySelector(`[data-memotoggle="${sid}|${tid}"]`);
        if (toggleBtn) toggleBtn.classList.toggle('has-memo', !!el.value.trim());
      });
    });
    root.querySelectorAll('[data-addtopic]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const sid = el.getAttribute('data-addtopic');
        const input = root.querySelector(`[data-newtopic="${sid}"]`);
        const val = input.value.trim();
        if (!val) return;
        const s = subjects.find(x => x.id === sid);
        const creditsInput = root.querySelector(`[data-newcredits="${sid}"]`);
        const courseTypeInput = root.querySelector(`[data-newcoursetype="${sid}"]`);
        const credits = creditsInput ? (Number(creditsInput.value) || 3) : 0;
        const courseType = courseTypeInput ? courseTypeInput.value : 'elec';
        s.topics.push({ id: uid(), name: val, done: false, memo: '', credits, courseType });
        input.value = '';
        await saveSubjects();
        renderSubjects();
        updateCompass();
      });
    });
    root.querySelectorAll('[data-newtopic]').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') root.querySelector(`[data-addtopic="${el.getAttribute('data-newtopic')}"]`).click();
      });
    });

    root.querySelectorAll('[data-coursetypeedit]').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', async () => {
        const [sid, tid] = el.getAttribute('data-coursetypeedit').split('|');
        const s = subjects.find(x => x.id === sid);
        const t = s && s.topics.find(x => x.id === tid);
        if (t) { t.courseType = el.value; await saveSubjects(); renderCreditsTotal(); }
      });
    });

    const qualRefEl = document.getElementById('cc-qual-ref');
    if (qualRefEl) renderQualRef();
    renderCreditsTotal();
    bindTaskListeners(root);
  }

  document.getElementById('cc-new-subject-btn').addEventListener('click', async () => {
    const input = document.getElementById('cc-new-subject-input');
    const val = input.value.trim();
    if (!val) return;
    subjects.push({ id: uid(), name: val, topics: [] });
    input.value = '';
    await saveSubjects();
    renderSubjects();
    updateCompass();
  });
  document.getElementById('cc-new-subject-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('cc-new-subject-btn').click();
  });

  function renderQualRef() {
    const root = document.getElementById('cc-qual-ref');
    const courseSubjects = subjects.filter(s => s.name.includes('수강과목'));
    const allCourses = [];
    courseSubjects.forEach(s => s.topics.forEach(t => allCourses.push(t.name)));
    if (!allCourses.length) { root.innerHTML = ''; return; }
    root.innerHTML = `
      <div class="cc-qual-ref">
        <div class="cc-qual-ref-title">내가 수강한 대학원 과목 (스터디 플래너 기준)</div>
        <div class="cc-qual-ref-list">
          ${allCourses.map(c => `<span class="cc-qual-ref-chip">${escapeHtml(c)}</span>`).join('')}
        </div>
      </div>`;
  }

  function renderQual() {
    renderQualRef();
    const root = document.getElementById('cc-qual-list');
    root.innerHTML = Object.entries(QUAL_DEFS).map(([orgKey, org]) => {
      const groupsHtml = org.groups.map(g => {
        const checkedCount = g.items.filter(it => qualChecks[`${orgKey}|${g.key}|${it.name}`]).length;
        const pct = Math.min(100, Math.round(checkedCount / g.need * 100));
        const isDone = checkedCount >= g.need;
        return `
          <div class="cc-qual-group-label">
            ${escapeHtml(g.label)}
            <span class="cc-qual-pct ${isDone ? 'done' : 'warn'}">${pct}%${isDone ? ' ✓' : ''}</span>
          </div>
          <div class="cc-qual-prog-wrap"><div class="cc-qual-prog-fill ${isDone ? 'done' : 'warn'}" style="width:${pct}%"></div></div>
          ${g.items.map(it => {
            const key = `${orgKey}|${g.key}|${it.name}`;
            const checked = !!qualChecks[key];
            const expanded = qualExpanded.has(key);
            return `
              <div class="cc-qual-item-wrap">
                <label class="cc-qual-item">
                  <input type="checkbox" ${checked ? 'checked' : ''} data-qualkey="${key}"/>
                  <span class="${checked ? 'checked' : ''}">${escapeHtml(it.name)}</span>
                  <button class="cc-qual-expand-btn" data-qualexpand="${key}" type="button">${expanded ? '예시 닫기 ▲' : '예시 과목 보기 ▾'}</button>
                </label>
                ${expanded ? `<div class="cc-qual-examples">${it.examples.map(ex => `<span class="cc-qual-ref-chip">${escapeHtml(ex)}</span>`).join('')}</div>` : ''}
              </div>`;
          }).join('')}
        `;
      }).join('');

      let trackerHtml = '';
      if (org.tracker) {
        const t = org.tracker;
        const checkedCount = t.items.filter(it => qualChecks[`${orgKey}|tracker|${it}`]).length;
        const trackerPct = Math.min(100, Math.round(checkedCount / t.items.length * 100));
        trackerHtml = `
          <div class="cc-qual-group-label">
            ${escapeHtml(t.label)}
            <span class="cc-qual-pct ${trackerPct === 100 ? 'done' : 'warn'}">${trackerPct}%${trackerPct === 100 ? ' ✓' : ''}</span>
          </div>
          <div class="cc-tracker-prog">
            <div class="cc-tracker-prog-bar"><div class="cc-tracker-prog-fill" style="width:${trackerPct}%"></div></div>
            <span class="cc-tracker-pct">${checkedCount}/${t.items.length}</span>
          </div>
          ${t.items.map(it => {
            const key = `${orgKey}|tracker|${it}`;
            const noteKey = `${orgKey}|trackerNote|${it}`;
            const checked = !!qualChecks[key];
            const noteVal = qualChecks[noteKey] || '';
            return `
              <div class="cc-qual-track-wrap">
                <label class="cc-qual-track-row">
                  <input type="checkbox" ${checked ? 'checked' : ''} data-qualkey="${key}"/>
                  <span class="${checked ? 'checked' : ''}">${escapeHtml(it)}</span>
                </label>
                <input type="text" class="cc-qual-track-note" placeholder="현재까지 달성 내용" value="${escapeHtml(noteVal)}" data-qualnote="${noteKey}"/>
              </div>`;
          }).join('')}
          ${t.note ? `<div class="cc-qual-note" style="margin-top:6px;border-top:none;padding-top:0;">${escapeHtml(t.note)}</div>` : ''}
        `;
      }

      const citeHtml = org.cite ? `<div class="cc-qual-cite">${escapeHtml(org.cite)}</div>` : '';

      return `
        <div class="cc-qual-org" data-qorg="${orgKey}">
          <div class="cc-qual-head" data-qtoggle="${orgKey}">
            <span class="cc-caret">▾</span>
            <span class="cc-qual-title">${escapeHtml(org.org)}</span>
          </div>
          <div class="cc-qual-body">
            ${citeHtml}
            ${groupsHtml}
            ${trackerHtml}
            <div class="cc-qual-note">${escapeHtml(org.note)}</div>
          </div>
        </div>`;
    }).join('');

    root.querySelectorAll('[data-qtoggle]').forEach(el => {
      el.addEventListener('click', () => {
        el.closest('.cc-qual-org').classList.toggle('collapsed');
        const body = el.closest('.cc-qual-org').querySelector('.cc-qual-body');
        body.style.display = el.closest('.cc-qual-org').classList.contains('collapsed') ? 'none' : '';
      });
    });
    root.querySelectorAll('[data-qualkey]').forEach(el => {
      el.addEventListener('change', async () => {
        const key = el.getAttribute('data-qualkey');
        qualChecks[key] = el.checked;
        await saveQualChecks();
        renderQual();
      });
    });
    root.querySelectorAll('[data-qualnote]').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('blur', async () => {
        const key = el.getAttribute('data-qualnote');
        qualChecks[key] = el.value;
        await saveQualChecks();
      });
    });
    root.querySelectorAll('[data-qualexpand]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const key = el.getAttribute('data-qualexpand');
        if (qualExpanded.has(key)) qualExpanded.delete(key);
        else qualExpanded.add(key);
        renderQual();
      });
    });
  }

  let notesPage = 0;
  const NOTES_PER_PAGE = 10;
  let editingNoteId = null;

  function renderNotes() {
    const root = document.getElementById('cc-notes-list');
    const filtered = selectedFilter === 'all' ? notes : notes.filter(n => n.tag === selectedFilter);
    if (!filtered.length) {
      root.innerHTML = '<div class="cc-empty">아직 기록이 없어요. 떠오르는 생각을 적어보세요.</div>';
      return;
    }
    const sorted = [...filtered].sort((a,b) => b.created - a.created);
    const totalPages = Math.ceil(sorted.length / NOTES_PER_PAGE);
    if (notesPage >= totalPages) notesPage = totalPages - 1;
    const paginated = sorted.slice(notesPage * NOTES_PER_PAGE, (notesPage + 1) * NOTES_PER_PAGE);

    root.innerHTML = `
      <div class="cc-notes-meta-bar">
        <span>총 ${sorted.length}개</span>
        ${totalPages > 1 ? `<div class="cc-notes-pager">
          <button class="cc-pager-btn" id="cc-notes-prev" ${notesPage===0?'disabled':''}>‹ 이전</button>
          <span>${notesPage+1} / ${totalPages}</span>
          <button class="cc-pager-btn" id="cc-notes-next" ${notesPage===totalPages-1?'disabled':''}>다음 ›</button>
        </div>` : ''}
      </div>
      ${paginated.map((n, i) => `
      <div class="cc-note-card tag-${n.tag}">
        <div class="cc-note-meta">
          <span style="font-size:11.5px;color:var(--ink-soft);margin-right:2px;">${notesPage * NOTES_PER_PAGE + i + 1}.</span>
          <span class="cc-note-tag">${tagLabel[n.tag] || n.tag}</span>
          <span class="cc-note-spacer"></span>
          <span class="cc-note-date">${formatDateTime(n.created)}</span>
          <button class="cc-del-btn" data-editnote="${n.id}" style="color:var(--sage);opacity:1">수정</button>
          <button class="cc-del-btn" data-delnote="${n.id}">삭제</button>
        </div>
        <div class="cc-note-text">${escapeHtml(n.text)}</div>
      </div>`).join('')}
      ${totalPages > 1 ? `<div class="cc-notes-meta-bar" style="margin-top:8px">
        <button class="cc-pager-btn" id="cc-notes-prev2" ${notesPage===0?'disabled':''}>‹ 이전</button>
        <span>${notesPage+1} / ${totalPages}</span>
        <button class="cc-pager-btn" id="cc-notes-next2" ${notesPage===totalPages-1?'disabled':''}>다음 ›</button>
      </div>` : ''}
    `;
    root.querySelectorAll('[data-editnote]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.getAttribute('data-editnote');
        const n = notes.find(x => x.id === id);
        if (!n) return;
        editingNoteId = id;
        document.getElementById('cc-note-input').value = n.text;
        document.getElementById('cc-note-save-btn').textContent = '수정 완료';
        document.getElementById('cc-note-cancel-btn').style.display = '';
        // set tag
        selectedTag = n.tag;
        document.getElementById('cc-tag-row').querySelectorAll('.cc-tag-btn').forEach(b => {
          b.classList.toggle('selected', b.getAttribute('data-tag') === n.tag);
        });
        document.getElementById('cc-note-input').scrollIntoView({ behavior: 'smooth', block: 'center' });
        document.getElementById('cc-note-input').focus();
      });
    });
    root.querySelectorAll('[data-delnote]').forEach(el => {
      el.addEventListener('click', async () => {
        notes = notes.filter(n => n.id !== el.getAttribute('data-delnote'));
        await saveNotes(); renderNotes(); updateCompass();
      });
    });
    root.querySelector('#cc-notes-prev') && root.querySelector('#cc-notes-prev').addEventListener('click', () => { notesPage--; renderNotes(); });
    root.querySelector('#cc-notes-next') && root.querySelector('#cc-notes-next').addEventListener('click', () => { notesPage++; renderNotes(); });
    root.querySelector('#cc-notes-prev2') && root.querySelector('#cc-notes-prev2').addEventListener('click', () => { notesPage--; renderNotes(); });
    root.querySelector('#cc-notes-next2') && root.querySelector('#cc-notes-next2').addEventListener('click', () => { notesPage++; renderNotes(); });
  }

  document.getElementById('cc-tag-row').querySelectorAll('.cc-tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedTag = btn.getAttribute('data-tag');
      document.getElementById('cc-tag-row').querySelectorAll('.cc-tag-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  document.getElementById('cc-filter-row').querySelectorAll('.cc-tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedFilter = btn.getAttribute('data-filter');
      notesPage = 0;
      document.getElementById('cc-filter-row').querySelectorAll('.cc-tag-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      renderNotes();
    });
  });

  function resetNoteForm() {
    document.getElementById('cc-note-input').value = '';
    document.getElementById('cc-note-save-btn').textContent = '기록하기';
    document.getElementById('cc-note-cancel-btn').style.display = 'none';
    editingNoteId = null;
  }

  document.getElementById('cc-note-cancel-btn').addEventListener('click', () => resetNoteForm());

  document.getElementById('cc-note-save-btn').addEventListener('click', async () => {
    const input = document.getElementById('cc-note-input');
    const val = input.value.trim();
    if (!val) return;
    if (editingNoteId) {
      // edit mode
      const n = notes.find(x => x.id === editingNoteId);
      if (n) { n.text = val; n.tag = selectedTag; }
      resetNoteForm();
    } else {
      notes.push({ id: uid(), tag: selectedTag, text: val, created: Date.now() });
      input.value = '';
    }
    await saveNotes();
    renderNotes();
    updateCompass();
  });

  // ── D-Day ────────────────────────────────────────────────────────────────
  function renderDdays() {
    const today = new Date(); today.setHours(0,0,0,0);
    const chipsHtml = ddays.map(d => {
      const target = new Date(d.date + 'T00:00:00');
      const diff = Math.round((target - today) / 86400000);
      const label = diff > 0 ? `D-${diff}` : diff === 0 ? 'D-DAY' : `D+${Math.abs(diff)}`;
      const cls = diff === 0 ? 'cc-dday-chip today' : (diff > 0 && diff <= 7) ? 'cc-dday-chip soon' : 'cc-dday-chip';
      return `<span class="${cls}" data-ddid="${d.id}">
        <span class="cc-dday-chip-label">${escapeHtml(d.label)}</span>
        <span class="cc-dday-chip-num">${label}</span>
        <button class="cc-dday-del" data-deldday="${d.id}" title="삭제">✕</button>
      </span>`;
    }).join('');

    const editFormHtml = `<div class="cc-dday-edit-form" id="cc-dday-edit-form" style="display:none">
      <input id="cc-dday-edit-label" type="text" maxlength="20" style="flex:0 0 90px"/>
      <input id="cc-dday-edit-date" type="date"/>
      <button id="cc-dday-edit-save-btn" style="background:var(--sage)">저장</button>
      <button id="cc-dday-edit-cancel-btn" style="background:var(--ink-soft)">취소</button>
    </div>`;

    const bar = document.getElementById('cc-dday-bar');
    if (bar) bar.innerHTML = chipsHtml;

    const chips = document.getElementById('cc-dday-chips');
    if (chips) {
      chips.innerHTML = chipsHtml + editFormHtml;
      // delete
      chips.querySelectorAll('[data-deldday]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          ddays = ddays.filter(d => d.id !== btn.getAttribute('data-deldday'));
          await saveDdays(); renderDdays();
        });
      });
      // edit (click chip label)
      chips.querySelectorAll('[data-ddid]').forEach(chip => {
        chip.querySelector('.cc-dday-chip-label') && chip.querySelector('.cc-dday-chip-label').addEventListener('click', (e) => {
          e.stopPropagation();
          const id = chip.getAttribute('data-ddid');
          const d = ddays.find(x => x.id === id);
          if (!d) return;
          const form = document.getElementById('cc-dday-edit-form');
          document.getElementById('cc-dday-edit-label').value = d.label;
          document.getElementById('cc-dday-edit-date').value = d.date;
          form.dataset.editId = id;
          form.style.display = 'flex';
        });
      });
      // edit save
      const saveBtn = document.getElementById('cc-dday-edit-save-btn');
      if (saveBtn) saveBtn.addEventListener('click', async () => {
        const form = document.getElementById('cc-dday-edit-form');
        const id = form.dataset.editId;
        const d = ddays.find(x => x.id === id);
        if (d) {
          d.label = document.getElementById('cc-dday-edit-label').value.trim() || d.label;
          d.date  = document.getElementById('cc-dday-edit-date').value || d.date;
          await saveDdays(); renderDdays();
        }
      });
      // edit cancel
      const cancelBtn = document.getElementById('cc-dday-edit-cancel-btn');
      if (cancelBtn) cancelBtn.addEventListener('click', () => {
        document.getElementById('cc-dday-edit-form').style.display = 'none';
      });
    }

    // bar delete (top bar)
    if (bar) bar.querySelectorAll('[data-deldday]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        ddays = ddays.filter(d => d.id !== btn.getAttribute('data-deldday'));
        await saveDdays(); renderDdays();
      });
    });
  }

  document.getElementById('cc-dday-add-btn') && document.getElementById('cc-dday-add-btn').addEventListener('click', async () => {
    const label = document.getElementById('cc-dday-label').value.trim();
    const date = document.getElementById('cc-dday-date').value;
    if (!label || !date) return;
    ddays.push({ id: uid(), label, date });
    document.getElementById('cc-dday-label').value = '';
    document.getElementById('cc-dday-date').value = '';
    await saveDdays(); renderDdays();
  });

  // ── Goals ────────────────────────────────────────────────────────────────
  let editingGoalId = null;

  function renderGoals() {
    const root = document.getElementById('cc-goals-list');
    const count = document.getElementById('cc-goals-count');
    const body = document.getElementById('cc-goals-body');
    const caret = document.getElementById('cc-goals-caret');
    if (!root) return;
    const done = goals.filter(g => g.done).length;
    if (count) count.textContent = `${done}/${goals.length}`;
    if (caret) caret.textContent = goalsOpen ? '▾' : '▸';
    if (body) body.style.display = goalsOpen ? '' : 'none';
    root.innerHTML = goals.map(g => `
      <div class="cc-goal-item" data-gid="${g.id}">
        <input type="checkbox" ${g.done ? 'checked' : ''} data-goalcheck="${g.id}"/>
        ${editingGoalId === g.id
          ? `<input class="cc-goal-edit-input" data-goaleditinput="${g.id}" value="${escapeHtml(g.text)}" style="flex:1;border:1px solid var(--sage);border-radius:6px;padding:4px 8px;font-size:13.5px;font-family:var(--body);"/>`
          : `<span class="cc-goal-text ${g.done ? 'done' : ''}">${escapeHtml(g.text)}</span>`
        }
        <span class="cc-goal-semester">${escapeHtml(g.semester)}</span>
        ${editingGoalId === g.id
          ? `<button class="cc-del-btn" data-goalsave="${g.id}" style="color:var(--sage);opacity:1">저장</button>

  function renderTasksInline(s) {
    const tasks = subjectTasks[s.id] || [];
    return tasks.map(t => `
      <div class="cc-task-item">
        <input type="checkbox" ${t.done ? 'checked' : ''} data-taskcheck="${s.id}|${t.id}"/>
        <span class="cc-task-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</span>
        <button class="cc-del-btn" data-taskdelete="${s.id}|${t.id}">삭제</button>
      </div>`).join('') || '<div style="font-size:12.5px;color:var(--ink-soft);padding:4px 0;">아직 과제나 메모가 없어요.</div>';
  }

  function bindTaskListeners(root) {
    root.querySelectorAll('[data-taskstoggle]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const sid = el.getAttribute('data-taskstoggle');
        const area = document.getElementById(`cc-tasks-${sid}`);
        if (area) { const open = area.style.display === 'none'; area.style.display = open ? '' : 'none'; el.style.color = open ? 'var(--rose)' : 'var(--sage)'; }
      });
    });
    root.querySelectorAll('[data-taskcheck]').forEach(el => {
      el.addEventListener('change', async () => {
        const [sid, tid] = el.getAttribute('data-taskcheck').split('|');
        const t = (subjectTasks[sid] || []).find(x => x.id === tid);
        if (t) t.done = el.checked;
        await saveSubjectTasks();
        el.nextElementSibling && el.nextElementSibling.classList.toggle('done', el.checked);
      });
    });
    root.querySelectorAll('[data-taskdelete]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const [sid, tid] = el.getAttribute('data-taskdelete').split('|');
        subjectTasks[sid] = (subjectTasks[sid] || []).filter(x => x.id !== tid);
        await saveSubjectTasks(); renderSubjects();
      });
    });
    root.querySelectorAll('[data-addtask]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const sid = el.getAttribute('data-addtask');
        const input = root.querySelector(`[data-newtask="${sid}"]`);
        const text = input ? input.value.trim() : '';
        if (!text) return;
        if (!subjectTasks[sid]) subjectTasks[sid] = [];
        subjectTasks[sid].push({ id: uid(), text, done: false });
        if (input) input.value = '';
        await saveSubjectTasks(); renderSubjects();
        setTimeout(() => { const area = document.getElementById(`cc-tasks-${sid}`); if (area) area.style.display = ''; }, 50);
      });
    });
    root.querySelectorAll('[data-newtask]').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());

    { id:'gestalt', cat:'인본주의',  name:'게슈탈트', core:'알아차림, 접촉, 현재 중심, 미해결과제', tech:'빈 의자, 역할극, 신체인식', view:'통합적 전체로서의 인간', role:'촉진자, 현재에 함께하는 자', strength:'창의적 기법, 신체·정서 통합', limit:'구조화 부족, 훈련 필요' },
    { id:'exist',   cat:'인본주의',  name:'실존주의', core:'실존적 불안, 자유·책임, 의미, 죽음', tech:'현존분석, 의미탐색, 실존적 직면', view:'자유롭고 책임 있는 존재', role:'동반자, 실존적 탐색자', strength:'의미·가치 탐색, 인간본질', limit:'비구조적, 측정 어려움' },
    { id:'cbt',     cat:'인지행동',  name:'CBT', core:'자동적 사고, 핵심신념, 인지왜곡', tech:'인지재구성, 행동실험, 소크라테스식 질문', view:'사고가 감정·행동에 영향', role:'협력적 교사', strength:'단기치료, 연구근거, 구조화', limit:'정서·관계 측면 소홀 가능' },
